<!DOCTYPE html>
<html>
<head>
  <title>Zoho Checkout (Simulated)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; padding: 40px 16px; background: #10141f; color: #fff; }
    .card { background: #1c2333; padding: 28px; border-radius: 12px; max-width: 480px; margin: 0 auto; border: 1px solid #2c344a; }
    h1 { color: #60a5fa; font-size: 20px; margin: 0 0 4px; }
    .sub { color: #94a3b8; font-size: 12px; margin-bottom: 20px; }
    .info p { display: flex; justify-content: space-between; border-bottom: 1px dashed #2c344a; padding: 8px 0; font-size: 14px; }
    .info span:last-child { font-weight: bold; }
    button { width: 100%; background: #2563eb; color: #fff; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 18px; }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
    .badge { display: inline-block; background: #7c2d12; color: #fdba74; font-size: 11px; padding: 2px 8px; border-radius: 999px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">SIMULATION — no real money moves</span>
    <h1>Zoho Payments Checkout</h1>
    <div class="sub">Two Knights Chess Academy — tuition payment</div>
    <div class="info">
      <p><span>Amount</span> <span id="amt"></span></p>
      <p><span>Student ID</span> <span id="sid"></span></p>
      <p><span>Billing Month</span> <span id="month"></span></p>
      <p><span>Reference</span> <span id="ref"></span></p>
    </div>
    <button id="payBtn" onclick="confirmPayment()">Pay Now (Simulate Success)</button>
    <p id="status"></p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const amt = params.get('amt') || '0';
    const sid = params.get('sid') || '';
    const month = params.get('month') || new Date().toISOString().slice(0, 7);
    const ref = params.get('ref') || '';
    document.getElementById('amt').textContent = '₹' + Number(amt).toLocaleString('en-IN');
    document.getElementById('sid').textContent = sid || 'N/A';
    document.getElementById('month').textContent = month;
    document.getElementById('ref').textContent = ref || 'N/A';

    async function confirmPayment() {
      const btn = document.getElementById('payBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = 'Processing payment…';
      status.style.color = '#94a3b8';
      try {
        // Mirrors a real Zoho payment_link.paid event so the webhook path
        // (record payment -> mark link paid -> recompute statuses) is
        // exercised end-to-end even in simulation.
        const res = await fetch('/api/zoho-webhook', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            simulated: true,
            event_type: 'payment_link.paid',
            data: {
              payment_link: {
                reference_id: ref,
                amount_paid: amt,
                payment_id: 'SIM-' + Date.now(),
                payments: []
              }
            },
            studentId: sid,
            month: month,
            amount: amt
          })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && (data.recorded || data.duplicate)) {
          status.textContent = '✅ Payment recorded! You can close this tab and return to the portal.';
          status.style.color = '#4ade80';
        } else if (res.ok) {
          status.textContent = '✅ Simulated OK (' + (data.warning || 'not recorded — storage unconfigured') + ').';
          status.style.color = '#fbbf24';
        } else {
          status.textContent = '❌ Webhook failed: ' + (data.error || res.status);
          status.style.color = '#f87171';
          btn.disabled = false;
        }
      } catch (e) {
        status.textContent = '❌ ' + e.message;
        status.style.color = '#f87171';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
